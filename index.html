<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick's Trip Log</title>
  <meta name="description" content="A log of hiking and travel trips.">
  <meta property="og:title" content="Nick's Trip Log">
  <meta property="og:description" content="A log of hiking and travel trips.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nick-virelli.github.io/nicks-trip-log/">
  <meta property="og:image" content="https://nick-virelli.github.io/nicks-trip-log/images/trips/mt-rainier-2026/8E69F307-B2FC-495A-A8B1-EAD2134651B3.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title"><a href="index.html">Nick's Trip Log</a></h1>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <button type="button" class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5" fill="currentColor" stroke="none"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 12.5A8.5 8.5 0 1 1 11.5 4a7 7 0 0 0 8.5 8.5z"/></svg>
      </button>
    </nav>
  </header>

  <div class="hero-strip">
    <div class="hero-strip-inner">
      <div class="hero-stat">
        <span class="hero-count">0</span>
        <span class="hero-stat-label">Loading…</span>
      </div>
      <div class="hero-latest" id="hero-latest">
        <span class="hero-latest-label">Latest trip</span>
        <span class="hero-post-loading">Loading...</span>
      </div>
    </div>
  </div>

  <main>
    <div class="home-layout">
      <div class="home-main">
        <section class="map-section">
          <h2>Explore by place</h2>
          <p class="map-instruction">Click a pin to zoom in, then click a city to read the trip.</p>
          <div class="map-controls" id="map-controls" style="display:none;">
            <button type="button" class="map-back" id="back-to-world">&larr; Back to world</button>
          </div>
          <div class="map-container" id="map-container">
            <p>Loading map…</p>
          </div>
        </section>

        <article class="post-display" id="post-display" aria-live="polite"></article>
      </div>

      <aside class="special-sidebar" aria-label="Recent trips">
        <h2 class="special-title">Recent Trips</h2>
        <input type="search" id="trip-search" class="trip-search" placeholder="Search by name, place, or year">
        <div id="recent-posts-list" class="special-list">
          <p class="post-meta">Loading…</p>
        </div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
    </nav>
    <p>Contact: <a href="about.html">Get in touch</a></p>
  </footer>

  <button type="button" id="back-to-top" class="back-to-top" aria-label="Back to top">&uarr; Back to top</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="data/posts.js"></script>
  <script src="data/map-data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
